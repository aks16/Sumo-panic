<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Sumo Panic Arena - Manette</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      touch-action: none;
      user-select: none;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 16px;
    }

    /* Header */
    .header {
      text-align: center;
      width: 100%;
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      margin: 0;
      background: linear-gradient(180deg, #e94560 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
    }

    .status {
      font-size: 14px;
      color: #a0a0a0;
      margin-top: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      display: inline-block;
    }

    .status.connected {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    .status.disconnected {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    /* Player UI */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      flex: 1;
      width: 100%;
      max-width: 500px;
    }

    /* Joystick */
    .joystick-container {
      position: relative;
      width: 150px;
      height: 150px;
    }

    .joystick-base {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #2d3748, #1a202c);
      border: 3px solid #4a5568;
      box-shadow: 
        inset 0 -5px 15px rgba(0,0,0,0.4),
        0 5px 20px rgba(0,0,0,0.3);
    }

    .joystick-stick {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #e94560, #c73e54);
      border: 3px solid #ff6b6b;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 
        0 4px 15px rgba(233, 69, 96, 0.4),
        inset 0 -3px 10px rgba(0,0,0,0.3);
      transition: box-shadow 0.1s;
    }

    .joystick-stick.active {
      box-shadow: 
        0 4px 25px rgba(233, 69, 96, 0.6),
        inset 0 -3px 10px rgba(0,0,0,0.3);
    }

    /* Push Button */
    .push-btn {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      font-weight: 900;
      font-family: 'Noto Sans JP', sans-serif;
      color: #fff;
      background: radial-gradient(circle at 30% 30%, #e94560, #b91c3c);
      box-shadow: 
        0 8px 0 #7f1d1d,
        0 10px 20px rgba(0,0,0,0.4),
        inset 0 -5px 15px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.1s;
      position: relative;
      overflow: hidden;
    }

    .push-btn::before {
      content: '';
      position: absolute;
      top: 10%;
      left: 20%;
      width: 30%;
      height: 20%;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
    }

    .push-btn:active {
      transform: translateY(4px);
      box-shadow: 
        0 4px 0 #7f1d1d,
        0 6px 15px rgba(0,0,0,0.4),
        inset 0 -5px 15px rgba(0,0,0,0.3);
    }

    .push-btn .label {
      display: block;
      font-size: 14px;
      margin-top: 4px;
    }

    .push-btn .icon {
      font-size: 32px;
      display: block;
    }

    /* Lottery UI */
    .lottery-ui {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .lottery-ui h2 {
      font-size: 28px;
      color: #f87171;
      margin-bottom: 16px;
    }

    .lottery-spinner {
      width: 80px;
      height: 80px;
      border: 6px solid rgba(255,255,255,0.1);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Ghost UI */
    .ghost-ui {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
    }

    .ghost-title {
      font-size: 24px;
      color: #a855f7;
      text-align: center;
    }

    .ghost-subtitle {
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 20px;
    }

    .ghost-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ghost-btn {
      width: 140px;
      height: 100px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .ghost-btn:active {
      transform: scale(0.95);
    }

    .ghost-btn.explosion {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }

    .ghost-btn.banana {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1a1a2e;
      box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
    }

    .ghost-btn .icon {
      font-size: 32px;
    }

    /* Spectator UI */
    .spectator-ui {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .spectator-ui h2 {
      font-size: 24px;
      color: #64748b;
    }

    .spectator-ui p {
      color: #94a3b8;
      margin-top: 8px;
    }

    /* Waiting UI */
    .waiting-ui {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .waiting-ui h2 {
      font-size: 24px;
      color: #4ade80;
    }

    .waiting-ui p {
      color: #94a3b8;
      margin-top: 8px;
    }

    .player-count {
      font-size: 48px;
      font-weight: 900;
      color: #e94560;
      margin: 20px 0;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1 class="title">SUMO PANIC</h1>
      <div id="status" class="status">Connexion...</div>
    </div>

    <!-- Waiting UI (avant le debut de la manche) -->
    <div id="waitingUI" class="waiting-ui">
      <h2>En attente du lancement</h2>
      <div class="player-count" id="playerCount">0</div>
      <p>joueur(s) connecte(s)</p>
      <p style="margin-top: 20px; color: #64748b;">Regardez l'ecran principal</p>
    </div>

    <!-- Player UI (joueur actif) -->
    <div id="playerUI" class="controls" style="display: none;">
      <div class="joystick-container">
        <div class="joystick-base" id="joystickArea">
          <div class="joystick-stick" id="stick"></div>
        </div>
      </div>

      <button class="push-btn" id="pushBtn">
        <span class="icon">&#128074;</span>
        <span class="label">POUSSER</span>
      </button>
    </div>

    <!-- Lottery UI -->
    <div id="lotteryUI" class="lottery-ui">
      <h2>ELIMINE!</h2>
      <div class="lottery-spinner"></div>
      <p>Tirage au sort fantome...</p>
    </div>

    <!-- Ghost UI -->
    <div id="ghostUI" class="ghost-ui">
      <h2 class="ghost-title">MODE FANTOME</h2>
      <p class="ghost-subtitle">Choisissez un piege a declencher</p>
      <div class="ghost-buttons">
        <button class="ghost-btn explosion" id="ghostExplosion">
          <span class="icon">&#128165;</span>
          <span>EXPLOSION</span>
        </button>
        <button class="ghost-btn banana" id="ghostBanana">
          <span class="icon">&#127820;</span>
          <span>BANANE</span>
        </button>
      </div>
    </div>

    <!-- Spectator UI -->
    <div id="spectatorUI" class="spectator-ui">
      <h2>Spectateur</h2>
      <p>Vous participerez a la prochaine manche</p>
    </div>

    <!-- Footer -->
    <div class="footer">
      Sumo Panic Arena
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    
    // Elements
    const statusEl = document.getElementById('status');
    const waitingUI = document.getElementById('waitingUI');
    const playerUI = document.getElementById('playerUI');
    const lotteryUI = document.getElementById('lotteryUI');
    const ghostUI = document.getElementById('ghostUI');
    const spectatorUI = document.getElementById('spectatorUI');
    const playerCountEl = document.getElementById('playerCount');
    
    const joystickArea = document.getElementById('joystickArea');
    const stick = document.getElementById('stick');
    const pushBtn = document.getElementById('pushBtn');
    
    const ghostExplosionBtn = document.getElementById('ghostExplosion');
    const ghostBananaBtn = document.getElementById('ghostBanana');

    let playerId = null;
    let mode = 'waiting'; // 'waiting', 'player', 'lottery', 'ghost', 'spectator'

    const inputState = { h: 0, v: 0, push: false };

    // --------- Mode UI ---------
    function setMode(newMode) {
      mode = newMode;
      
      waitingUI.style.display = 'none';
      playerUI.style.display = 'none';
      lotteryUI.style.display = 'none';
      ghostUI.style.display = 'none';
      spectatorUI.style.display = 'none';

      switch(mode) {
        case 'waiting':
          waitingUI.style.display = 'flex';
          break;
        case 'player':
          playerUI.style.display = 'flex';
          break;
        case 'lottery':
          lotteryUI.style.display = 'flex';
          break;
        case 'ghost':
          ghostUI.style.display = 'flex';
          break;
        case 'spectator':
          spectatorUI.style.display = 'flex';
          break;
      }
    }

    // --------- Socket Events ---------
    socket.on('connect', () => {
      statusEl.textContent = 'Connexion...';
      statusEl.className = 'status';
    });

    socket.on('hello', (data) => {
      playerId = data.playerId;
      const phase = data.phase || 'LOBBY';

      statusEl.textContent = `Joueur #${playerId}`;
      statusEl.className = 'status connected';

      if (phase === 'PLAYING') {
        setMode('spectator');
      } else {
        setMode('waiting');
      }
    });

    socket.on('playerCount', (count) => {
      if (playerCountEl) {
        playerCountEl.textContent = count;
      }
    });

    socket.on('roundStarted', (data) => {
      // La manche commence, on devient joueur actif
      setMode('player');
    });

    socket.on('roundReset', (data) => {
      // Retour au lobby
      setMode('waiting');
    });

    socket.on('enterLottery', () => {
      setMode('lottery');
      inputState.h = 0;
      inputState.v = 0;
      inputState.push = false;
      resetJoystick();
    });

    socket.on('ghostResult', (data) => {
      if (data && data.selected) {
        setMode('ghost');
      } else {
        setMode('spectator');
      }
    });

    socket.on('enterGhostMode', () => {
      setMode('ghost');
    });

    socket.on('disconnect', () => {
      statusEl.textContent = 'Deconnecte';
      statusEl.className = 'status disconnected';
      setMode('spectator');
    });

    // --------- Input Loop ---------
    function sendInputLoop() {
      if (mode !== 'player') {
        inputState.h = 0;
        inputState.v = 0;
        inputState.push = false;
      }
      socket.emit('input', inputState);
      setTimeout(sendInputLoop, 50);
    }
    sendInputLoop();

    // --------- Push Button ---------
    function addPressHold(btn, onDown, onUp) {
      const upFn = onUp || (() => {});
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(); });
      btn.addEventListener('touchend', (e) => { e.preventDefault(); upFn(); });
      btn.addEventListener('mousedown', (e) => { e.preventDefault(); onDown(); });
      btn.addEventListener('mouseup', (e) => { e.preventDefault(); upFn(); });
      btn.addEventListener('mouseleave', (e) => { e.preventDefault(); upFn(); });
    }

    addPressHold(pushBtn,
      () => { inputState.push = true; },
      () => { inputState.push = false; }
    );

    // --------- Joystick ---------
    let joystickActive = false;
    const maxRadius = 50;

    function getPointFromEvent(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function updateJoystick(e) {
      const point = getPointFromEvent(e);
      const rect = joystickArea.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      let dx = point.x - centerX;
      let dy = point.y - centerY;

      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxRadius) {
        dx = dx * maxRadius / dist;
        dy = dy * maxRadius / dist;
      }

      stick.style.left = `calc(50% + ${dx}px)`;
      stick.style.top = `calc(50% + ${dy}px)`;
      stick.classList.add('active');

      inputState.h = dx / maxRadius;
      inputState.v = -dy / maxRadius;
    }

    function resetJoystick() {
      stick.style.left = '50%';
      stick.style.top = '50%';
      stick.classList.remove('active');
      inputState.h = 0;
      inputState.v = 0;
    }

    joystickArea.addEventListener('touchstart', (e) => {
      if (mode !== 'player') return;
      e.preventDefault();
      joystickActive = true;
      updateJoystick(e);
    });

    joystickArea.addEventListener('touchmove', (e) => {
      if (!joystickActive || mode !== 'player') return;
      e.preventDefault();
      updateJoystick(e);
    });

    joystickArea.addEventListener('touchend', (e) => {
      e.preventDefault();
      joystickActive = false;
      resetJoystick();
    });

    joystickArea.addEventListener('mousedown', (e) => {
      if (mode !== 'player') return;
      e.preventDefault();
      joystickActive = true;
      updateJoystick(e);
    });

    window.addEventListener('mousemove', (e) => {
      if (!joystickActive || mode !== 'player') return;
      updateJoystick(e);
    });

    window.addEventListener('mouseup', () => {
      if (!joystickActive) return;
      joystickActive = false;
      resetJoystick();
    });

    // --------- Ghost Buttons ---------
    ghostExplosionBtn.addEventListener('click', () => {
      if (mode === 'ghost') {
        socket.emit('trap', { playerId, type: 'explosion' });
        // Feedback visuel
        ghostExplosionBtn.style.transform = 'scale(0.9)';
        setTimeout(() => { ghostExplosionBtn.style.transform = ''; }, 200);
      }
    });

    ghostBananaBtn.addEventListener('click', () => {
      if (mode === 'ghost') {
        socket.emit('trap', { playerId, type: 'banana' });
        ghostBananaBtn.style.transform = 'scale(0.9)';
        setTimeout(() => { ghostBananaBtn.style.transform = ''; }, 200);
      }
    });

    // --------- Init ---------
    setMode('waiting');
  </script>
</body>
</html>
